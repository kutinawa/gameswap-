<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>GameSwap</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600&family=Noto+Sans+JP:wght@400;500&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0b0b10;--s1:#13131c;--s2:#1c1c28;--s3:#242433;--bd:#ffffff10;--bd2:#ffffff1e;--tx:#ddddf0;--mu:#667;--ac:#7c6af7;--ac2:#9d8fff;--er:#e05555}
html,body{background:var(--bg);color:var(--tx);font-family:'Noto Sans JP',sans-serif;min-height:100vh;font-size:15px;line-height:1.6}
.page{display:none;opacity:0;transition:opacity .25s ease}.page.active{display:block}
.page.visible{opacity:1}
@keyframes slideUp{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(0.97)}}
.recv-card{animation:slideUp .35s cubic-bezier(.22,.68,0,1.2) both}
.recv-eyebrow{animation:fadeIn .3s .15s ease both}
.btn-post:active{animation:pulse .15s ease}
.hero-bg{transition:opacity .4s ease,background-image 0s}
.hero-inf{transition:opacity .4s ease}
.hero-ph{transition:opacity .3s ease}
.ri{transition:background .12s,opacity .15s}
.rbox .ri{animation:fadeIn .2s ease both}
.rbox .ri:nth-child(2){animation-delay:.04s}
.rbox .ri:nth-child(3){animation-delay:.08s}
.rbox .ri:nth-child(4){animation-delay:.12s}
.rbox .ri:nth-child(5){animation-delay:.16s}
.rbox .ri:nth-child(6){animation-delay:.2s}
.rbox .ri:nth-child(7){animation-delay:.24s}
.rbox .ri:nth-child(8){animation-delay:.28s}
.wrap{max-width:560px;margin:0 auto;padding:2rem 1rem 4rem}
.hd{text-align:center;padding:2.5rem 0 2rem}
.hd-title{font-family:'Rajdhani',sans-serif;font-size:clamp(28px,7vw,42px);font-weight:600;letter-spacing:.15em;color:#fff;text-transform:uppercase}
.hd-title span{color:var(--ac)}
.hd-sub{font-size:11px;color:var(--mu);letter-spacing:.12em;margin-top:6px;text-transform:uppercase}
.hero{position:relative;width:100%;height:clamp(140px,30vw,220px);border-radius:12px;overflow:hidden;background:var(--s1);border:1px solid var(--bd);margin-bottom:1.75rem}
.hero-bg{position:absolute;inset:0;background-size:cover;background-position:center;transition:opacity .3s}
.hero-g{position:absolute;inset:0;background:linear-gradient(to top,rgba(0,0,0,.75) 0%,transparent 55%)}
.hero-inf{position:absolute;bottom:0;left:0;right:0;padding:.85rem 1rem}
.hero-t{font-size:16px;font-weight:500;color:#fff;margin-bottom:2px}
.hero-d{font-size:11px;color:rgba(255,255,255,.45)}
.hero-ph{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;color:#2a2a3a;transition:opacity .3s}
.hero-ph svg{width:36px;height:36px}
.hero-ph span{font-size:12px;letter-spacing:.05em;color:#334}
.lbl{font-size:10px;font-weight:500;letter-spacing:.12em;color:var(--mu);text-transform:uppercase;margin-bottom:8px}
.lbl-opt{font-size:10px;color:#445;font-weight:400;letter-spacing:0;text-transform:none}
.srow{display:flex;gap:8px;margin-bottom:6px}
input[type=text],input[type=password],textarea{width:100%;background:var(--s2);border:1px solid var(--bd2);border-radius:8px;padding:10px 14px;font-size:14px;color:var(--tx);outline:none;transition:border-color .15s;font-family:'Noto Sans JP',sans-serif}
input[type=text]{height:42px}
input[type=password]{height:42px}
input::placeholder,textarea::placeholder{color:#334}
input:focus,textarea:focus{border-color:var(--ac)}
textarea{resize:vertical;min-height:80px;margin-bottom:4px}
.char-count{font-size:11px;color:#445;text-align:right;margin-bottom:1.25rem}
.char-count.warn{color:var(--er)}
.btn-s{flex-shrink:0;height:42px;padding:0 18px;background:var(--ac);border:none;border-radius:8px;color:#fff;font-size:13px;font-weight:500;cursor:pointer;white-space:nowrap;display:flex;align-items:center;gap:6px;transition:background .15s;font-family:'Noto Sans JP',sans-serif}
.btn-s:hover{background:var(--ac2)}.btn-s:disabled{opacity:.4;cursor:default}
.btn-post{width:100%;padding:13px;background:var(--ac);border:none;border-radius:10px;color:#fff;font-size:14px;font-weight:500;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;transition:background .15s;letter-spacing:.03em;font-family:'Noto Sans JP',sans-serif}
.btn-post:hover{background:var(--ac2)}.btn-post:disabled{opacity:.4;cursor:default}
.cooldown-bar{width:100%;height:3px;background:var(--s2);border-radius:2px;margin-top:8px;overflow:hidden;display:none}
.cooldown-fill{height:100%;background:var(--ac);transition:width .1s linear}
.rbox{background:var(--s1);border:1px solid var(--bd);border-radius:10px;overflow:hidden;margin-bottom:1.75rem}
.ri{display:flex;align-items:center;gap:10px;padding:10px 12px;cursor:pointer;border-bottom:1px solid var(--bd);transition:background .1s}
.ri:last-child{border-bottom:none}.ri:hover{background:var(--s2)}.ri.sel{background:var(--s3)}
.rt-wrap{width:54px;height:38px;border-radius:5px;flex-shrink:0;background:var(--s3);background-size:cover;background-position:center}
.rn{font-size:13px;font-weight:500;color:var(--tx);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.rm{font-size:11px;color:var(--mu);margin-top:1px}
.rc{margin-left:auto;font-size:18px;color:#334;flex-shrink:0}.rc.on{color:var(--ac)}
.ldrow{display:flex;align-items:center;gap:10px;padding:14px 12px;color:var(--mu);font-size:13px}
.div{border:none;border-top:1px solid var(--bd);margin:2rem 0}
.ph{display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem}
.ph-t{font-size:13px;font-weight:500;color:var(--tx)}
.ph-c{font-size:11px;background:var(--s2);color:var(--mu);padding:3px 10px;border-radius:99px;border:1px solid var(--bd)}
.prow{display:flex;gap:12px;align-items:flex-start;padding:12px 0;border-bottom:1px solid var(--bd)}
.pt-wrap{width:58px;height:42px;border-radius:6px;flex-shrink:0;background:var(--s2);background-size:cover;background-position:center}
.ptitle{font-size:13px;font-weight:500;color:var(--tx);margin-bottom:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pcmt{font-size:12px;color:var(--mu);line-height:1.5;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.del-btn{flex-shrink:0;background:none;border:1px solid #333;border-radius:6px;color:#445;font-size:11px;padding:4px 8px;cursor:pointer;font-family:'Noto Sans JP',sans-serif;display:none}
.del-btn:hover{border-color:var(--er);color:var(--er)}
.admin-mode .del-btn{display:block}
.recv-page{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:2rem 1rem}
.recv-eyebrow{font-size:10px;letter-spacing:.2em;color:var(--mu);text-transform:uppercase;margin-bottom:1rem;display:flex;align-items:center;gap:8px;width:100%;max-width:460px}
.recv-eyebrow::before,.recv-eyebrow::after{content:'';flex:1;height:1px;background:var(--bd2)}
.recv-card{width:100%;max-width:460px;border-radius:16px;overflow:hidden;border:1px solid var(--bd2)}
.recv-hero{position:relative;width:100%;height:clamp(180px,40vw,280px);background:var(--s2);background-size:cover;background-position:center}
.recv-hero-g{position:absolute;inset:0;background:linear-gradient(to top,rgba(0,0,0,.8) 0%,transparent 55%)}
.recv-hero-t{position:absolute;bottom:0;left:0;right:0;padding:1rem 1.25rem}
.recv-hero-title{font-size:20px;font-weight:500;color:#fff;margin-bottom:3px}
.recv-hero-domain{font-size:11px;color:rgba(255,255,255,.4)}
.recv-body{background:var(--s1);padding:1.25rem}
.recv-comment{font-size:15px;color:var(--tx);line-height:1.8;padding:14px 16px;background:var(--s2);border-left:2px solid var(--ac);margin-bottom:1.25rem;border-radius:0 6px 6px 0}
.recv-no-comment{font-size:13px;color:var(--mu);font-style:italic;padding:10px 0;margin-bottom:1.25rem}
.recv-actions{display:flex;flex-direction:column;gap:10px}
.btn-store{display:flex;align-items:center;justify-content:center;gap:8px;padding:12px;background:var(--ac);border:none;border-radius:10px;color:#fff;font-size:14px;font-weight:500;cursor:pointer;transition:background .15s;width:100%;font-family:'Noto Sans JP',sans-serif}
.btn-store:hover{background:var(--ac2)}
.btn-back{display:flex;align-items:center;justify-content:center;gap:8px;padding:11px;background:transparent;border:1px solid var(--bd2);border-radius:10px;color:var(--mu);font-size:13px;cursor:pointer;transition:all .15s;width:100%;font-family:'Noto Sans JP',sans-serif}
.btn-back:hover{background:var(--s2);color:var(--tx)}
.admin-page .wrap{max-width:560px;margin:0 auto;padding:2rem 1rem 4rem}
.admin-login{max-width:360px;margin:4rem auto;text-align:center}
.admin-login h2{font-size:16px;font-weight:500;margin-bottom:1.5rem;color:var(--tx)}
.admin-login input{margin-bottom:10px}
.empty{text-align:center;padding:2rem;color:#334;font-size:13px}
.err{font-size:12px;color:var(--er);margin-top:4px;margin-bottom:.75rem;min-height:1em}
.spin{width:14px;height:14px;border-radius:50%;border:2px solid rgba(255,255,255,.15);border-top-color:#fff;animation:rot .6s linear infinite;flex-shrink:0}
@keyframes rot{to{transform:rotate(360deg)}}
.admin-link{font-size:11px;color:#334;text-align:center;margin-top:3rem;cursor:pointer}
.admin-link:hover{color:var(--mu)}
@media(max-width:480px){.wrap{padding:1rem .75rem 3rem}.hd{padding:1.5rem 0 1.5rem}}
</style>
</head>
<body>

<!-- ===== 投稿ページ ===== -->
<div class="page active visible" id="page-post">
<div class="wrap">
  <header class="hd">
    <div class="hd-title">Game<span>Swap</span></div>
    <div class="hd-sub">send one, get one — 誰かのおすすめが届く</div>
  </header>

  <div class="hero" id="hero">
    <div class="hero-bg" id="hero-bg" style="opacity:0"></div>
    <div class="hero-g" id="hero-grd" style="opacity:0"></div>
    <div class="hero-ph" id="hph">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2"><rect x="2" y="6" width="20" height="12" rx="2"/><path d="M6 12h2m2 0h2M17 10v4"/></svg>
      <span>pick a game.</span>
    </div>
    <div class="hero-inf" id="hero-inf" style="opacity:0">
      <div class="hero-t" id="htitle"></div>
      <div class="hero-d" id="hdomain"></div>
    </div>
  </div>

  <div class="lbl">game search</div>
  <div class="srow">
    <input type="text" id="query" placeholder="タイトルを入力" onkeydown="if(event.key==='Enter')doSearch()"/>
    <button class="btn-s" id="sbtn" onclick="doSearch()">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.35-4.35"/></svg>検索
    </button>
  </div>
  <div id="serr" class="err"></div>
  <div id="rarea"></div>

  <div class="lbl">your message <span class="lbl-opt">（任意）</span></div>
  <textarea id="cmt" placeholder="コメントを入力" maxlength="200" oninput="updateCharCount()"></textarea>
  <div class="char-count" id="char-count">0 / 200</div>

  <button class="btn-post" id="pbtn" onclick="doSubmit()">
    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M12 2v4M12 18v4M4.93 4.93l2.83 2.83M16.24 16.24l2.83 2.83M2 12h4M18 12h4M4.93 19.07l2.83-2.83M16.24 7.76l2.83-2.83"/></svg>
    見知らぬ誰かに送る
  </button>
  <div class="cooldown-bar" id="cooldown-bar"><div class="cooldown-fill" id="cooldown-fill" style="width:100%"></div></div>

  <hr class="div"/>
  <div class="ph">
    <span class="ph-t">recent drops</span>
    <span class="ph-c" id="pcnt">0件</span>
  </div>
  <div id="posts"></div>

  <div class="admin-link" onclick="showPage('page-admin')">管理者ログイン</div>
</div>
</div>

<!-- ===== おすすめ受け取りページ ===== -->
<div class="page" id="page-recv">
<div class="recv-page">
  <div class="recv-eyebrow">your drop has arrived</div>
  <div class="recv-card">
    <div class="recv-hero" id="recv-hero">
      <div class="recv-hero-g"></div>
      <div class="recv-hero-t">
        <div class="recv-hero-title" id="recv-title"></div>
        <div class="recv-hero-domain" id="recv-domain"></div>
      </div>
    </div>
    <div class="recv-body">
      <div id="recv-cmt-wrap"></div>
      <div class="recv-actions">
        <button class="btn-store" id="recv-store-btn">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6M15 3h6v6M10 14 21 3"/></svg>
          store page →
        </button>
        <button class="btn-back" onclick="goPost()">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
          もう一人に送る
        </button>
      </div>
    </div>
  </div>
</div>
</div>

<!-- ===== 管理者ページ ===== -->
<div class="page" id="page-admin">
<div class="wrap">
  <div id="admin-login-area">
    <div class="admin-login">
      <h2>管理者ログイン</h2>
      <input type="password" id="admin-pw" placeholder="管理者パスワード" onkeydown="if(event.key==='Enter')adminLogin()"/>
      <div id="admin-err" class="err"></div>
      <button class="btn-post" onclick="adminLogin()">ログイン</button>
      <div style="margin-top:1rem"><button class="btn-back" onclick="goPost()" style="width:auto;padding:8px 20px;display:inline-flex">← 戻る</button></div>
    </div>
  </div>
  <div id="admin-panel" style="display:none">
    <header class="hd">
      <div class="hd-title" style="font-size:24px">管理パネル</div>
    </header>
    <div class="ph">
      <span class="ph-t">全投稿</span>
      <span class="ph-c" id="admin-cnt">0件</span>
    </div>
    <div id="admin-posts"></div>
    <div style="margin-top:2rem"><button class="btn-back" onclick="adminLogout()" style="width:auto;padding:8px 20px;display:inline-flex">ログアウト</button></div>
  </div>
</div>
</div>

<script>
// ===== 設定（ここを書き換える） =====
const SUPABASE_URL = 'https://voeimzpwqeewjkgancuh.supabase.co';
const SUPABASE_KEY = 'sb_publishable_V6zOPsmdEDyIt3IVW1c-vA_C4Jd5Fi2';
const ADMIN_PASSWORD = '-+hs3)@zk_?EV/*';
const PROXY = 'https://steam-proxy.kutinawa-channel.workers.dev';
// =====================================

const COOLDOWN_MS = 30000; // 連続投稿の間隔（ミリ秒）
const MAX_COMMENT = 200;

const configured = () => SUPABASE_URL !== 'YOUR_SUPABASE_URL';
let sel = null;
let lastPostTime = 0;
let cooldownTimer = null;
let isAdmin = false;

// XSSエスケープ
function esc(str) {
  if (!str) return '';
  return String(str)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#x27;');
}

function showPage(id) {
  const current = document.querySelector('.page.active');
  const next = document.getElementById(id);
  if (current === next) return;
  if (current) {
    current.style.opacity = '0';
    setTimeout(() => {
      current.classList.remove('active', 'visible');
      current.style.opacity = '';
      next.classList.add('active');
      window.scrollTo(0, 0);
      requestAnimationFrame(() => requestAnimationFrame(() => next.classList.add('visible')));
    }, 220);
  } else {
    next.classList.add('active');
    requestAnimationFrame(() => requestAnimationFrame(() => next.classList.add('visible')));
  }
}
function goPost() { showPage('page-post'); }

async function sbFetch(path, opts = {}) {
  const r = await fetch(SUPABASE_URL + path, {
    headers: {
      'apikey': SUPABASE_KEY,
      'Authorization': 'Bearer ' + SUPABASE_KEY,
      'Content-Type': 'application/json',
      'Prefer': opts.method === 'POST' ? 'return=minimal' : 'return=representation',
      ...(opts.headers || {})
    },
    ...opts
  });
  if (r.status === 204 || r.headers.get('content-length') === '0') return null;
  const text = await r.text();
  if (!text) return null;
  try { return JSON.parse(text); } catch(e) { return null; }
}

function steamImg(appid) {
  return `https://shared.cloudflare.steamstatic.com/store_item_assets/steam/apps/${appid}/header.jpg`;
}

function updateCharCount() {
  const len = document.getElementById('cmt').value.length;
  const el = document.getElementById('char-count');
  el.textContent = `${len} / ${MAX_COMMENT}`;
  el.className = 'char-count' + (len > MAX_COMMENT * 0.9 ? ' warn' : '');
}

function startCooldown() {
  lastPostTime = Date.now();
  const bar = document.getElementById('cooldown-bar');
  const fill = document.getElementById('cooldown-fill');
  const btn = document.getElementById('pbtn');
  bar.style.display = 'block';
  btn.disabled = true;
  if (cooldownTimer) clearInterval(cooldownTimer);
  cooldownTimer = setInterval(() => {
    const elapsed = Date.now() - lastPostTime;
    const pct = Math.max(0, 100 - (elapsed / COOLDOWN_MS * 100));
    fill.style.width = pct + '%';
    if (elapsed >= COOLDOWN_MS) {
      clearInterval(cooldownTimer);
      bar.style.display = 'none';
      btn.disabled = false;
    }
  }, 100);
}


async function doSearch() {
  const q = document.getElementById('query').value.trim();
  const err = document.getElementById('serr');
  const area = document.getElementById('rarea');
  err.textContent = '';
  if (!q) { err.textContent = 'タイトルを入力してください'; return; }
  const btn = document.getElementById('sbtn');
  btn.disabled = true;
  btn.innerHTML = '<div class="spin"></div>検索中';
  area.innerHTML = `<div class="rbox"><div class="ldrow"><div class="spin"></div><span>searching...</span></div></div>`;
  sel = null; clearHero();
  let items = [];
  try {
    const r = await fetch(`${PROXY}?q=${encodeURIComponent(q)}`);
    const d = await r.json();
    items = (d.items || []).slice(0, 8);
  } catch(e) { items = []; }
  if (items.length === 0) {
    area.innerHTML = `<div class="rbox"><div class="empty">no results. try a different keyword.</div></div>`;
  } else {
    renderResults(items.map(g => ({ appid: g.id || g.appid, name: g.name })));
  }
  btn.disabled = false;
  btn.innerHTML = '<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.35-4.35"/></svg>検索';
}

function renderResults(items) {
  const area = document.getElementById('rarea');
  if (!items || items.length === 0) {
    area.innerHTML = `<div class="rbox"><div class="empty">no results. try in English.</div></div>`;
    return;
  }
  window._res = items;
  area.innerHTML = `<div class="rbox">${items.map((g, i) => {
    const img = steamImg(g.appid);
    return `<div class="ri" id="ri${i}" onclick="pick(${i})">
      <div class="rt-wrap" style="background-image:url('${img}')"></div>
      <div style="flex:1;min-width:0"><div class="rn">${esc(g.name)}</div><div class="rm">Steam · App ${g.appid}</div></div>
      <span class="rc" id="rc${i}">○</span>
    </div>`;
  }).join('')}</div><div style="margin-bottom:1.75rem"></div>`;
}

function pick(i) {
  const g = (window._res || [])[i];
  if (!g) return;
  document.querySelectorAll('.ri').forEach((el, j) => {
    el.classList.toggle('sel', j === i);
    const c = document.getElementById(`rc${j}`);
    if (c) { c.textContent = j === i ? '●' : '○'; c.className = j === i ? 'rc on' : 'rc'; }
  });
  sel = { title: g.name, url: `https://store.steampowered.com/app/${g.appid}/`, image: steamImg(g.appid) };
  showHero(g.name, sel.image, 'store.steampowered.com');
}

function showHero(t, img, d) {
  document.getElementById('hero-bg').style.backgroundImage = `url('${img}')`;
  document.getElementById('hero-bg').style.opacity = '1';
  document.getElementById('hero-grd').style.opacity = '1';
  document.getElementById('hero-inf').style.opacity = '1';
  document.getElementById('hph').style.opacity = '0';
  document.getElementById('htitle').textContent = t;
  document.getElementById('hdomain').textContent = d;
}
function clearHero() {
  document.getElementById('hero-bg').style.opacity = '0';
  document.getElementById('hero-grd').style.opacity = '0';
  document.getElementById('hero-inf').style.opacity = '0';
  document.getElementById('hph').style.opacity = '1';
}

function showReceived(p) {
  const hero = document.getElementById('recv-hero');
  hero.style.backgroundImage = p.image ? `url('${p.image}')` : 'none';
  document.getElementById('recv-title').textContent = p.title;
  document.getElementById('recv-domain').textContent = p.url ? p.url.replace(/^https?:\/\//, '').split('/')[0] : '';
  const cw = document.getElementById('recv-cmt-wrap');
  cw.innerHTML = p.comment && p.comment.trim()
    ? `<div class="recv-comment">${esc(p.comment)}</div>`
    : `<div class="recv-no-comment">no comment</div>`;
  const sb = document.getElementById('recv-store-btn');
  if (p.url) { sb.style.display = 'flex'; sb.onclick = () => window.open(p.url, '_blank', 'noopener,noreferrer'); }
  else { sb.style.display = 'none'; }
  const card = document.querySelector('.recv-card');
  if (card) { card.style.animation = 'none'; card.offsetHeight; card.style.animation = ''; }
  showPage('page-recv');
}

async function doSubmit() {
  const cmt = document.getElementById('cmt').value.trim().slice(0, MAX_COMMENT);
  const btn = document.getElementById('pbtn');
  const err = document.getElementById('serr');
  err.textContent = '';
  if (!sel) { err.textContent = 'ゲームを選んでください'; return; }
  // レート制限チェック
  if (Date.now() - lastPostTime < COOLDOWN_MS) {
    const remain = Math.ceil((COOLDOWN_MS - (Date.now() - lastPostTime)) / 1000);
    err.textContent = `クールダウン中 — あと${remain}秒`;
    return;
  }
  btn.disabled = true;
  btn.style.transform = 'scale(0.97)';
  setTimeout(() => { btn.style.transform = ''; }, 150);
  btn.innerHTML = '<div class="spin"></div>rolling...';

  if (!configured()) {
    setTimeout(() => {
      reset();
      btn.innerHTML = '<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M12 2v4M12 18v4M4.93 4.93l2.83 2.83M16.24 16.24l2.83 2.83M2 12h4M18 12h4M4.93 19.07l2.83-2.83M16.24 7.76l2.83-2.83"/></svg>見知らぬ誰かに送る';
      startCooldown();
      showReceived({ title: 'Hollow Knight', url: 'https://store.steampowered.com/app/367520/', image: steamImg(367520), comment: 'Supabaseを設定すると実際の投稿が届きます' });
    }, 600);
    return;
  }

  await sbFetch('/rest/v1/posts', { method: 'POST', body: JSON.stringify({ title: sel.title, url: sel.url, image: sel.image, comment: cmt || null }) });
  const all = await sbFetch('/rest/v1/posts?select=*&order=created_at.desc&limit=200');
  const others = (all || []).filter(p => !(p.title === sel.title && p.comment === (cmt || null)));
  reset();
  btn.innerHTML = '<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M12 2v4M12 18v4M4.93 4.93l2.83 2.83M16.24 16.24l2.83 2.83M2 12h4M18 12h4M4.93 19.07l2.83-2.83M16.24 7.76l2.83-2.83"/></svg>見知らぬ誰かに送る';
  startCooldown();
  loadPosts();
  if (others.length > 0) {
    showReceived(others[Math.floor(Math.random() * others.length)]);
  } else {
    showReceived({ title: 'あなたが最初の投稿者です', url: '', image: '', comment: '次の人があなたのゲームを受け取ります。' });
  }
}

function reset() {
  document.getElementById('query').value = '';
  document.getElementById('cmt').value = '';
  document.getElementById('char-count').textContent = `0 / ${MAX_COMMENT}`;
  document.getElementById('rarea').innerHTML = '';
  sel = null; clearHero();
}

async function loadPosts() {
  if (!configured()) {
    document.getElementById('pcnt').textContent = '—';
    document.getElementById('posts').innerHTML = `<div class="empty">Supabaseを設定すると投稿が表示されます</div>`;
    return;
  }
  const posts = await sbFetch('/rest/v1/posts?select=*&order=created_at.desc&limit=50');
  document.getElementById('pcnt').textContent = `${(posts || []).length}件`;
  const c = document.getElementById('posts');
  if (!posts || posts.length === 0) { c.innerHTML = `<div class="empty">no drops yet. be the first.</div>`; return; }
  c.innerHTML = posts.map(p => {
    const th = p.image ? `<div class="pt-wrap" style="background-image:url('${p.image}')"></div>` : `<div class="pt-wrap"></div>`;
    return `<div class="prow" id="prow-${p.id}">${th}<div style="flex:1;min-width:0"><div class="ptitle">${esc(p.title)}</div><div class="pcmt">${esc(p.comment || '—')}</div></div><button class="del-btn" onclick="deletePost('${p.id}')">削除</button></div>`;
  }).join('');
  if (isAdmin) document.getElementById('posts').classList.add('admin-mode');
}

// ===== 管理者機能 =====
function adminLogin() {
  const pw = document.getElementById('admin-pw').value;
  if (pw === ADMIN_PASSWORD) {
    isAdmin = true;
    document.getElementById('admin-login-area').style.display = 'none';
    document.getElementById('admin-panel').style.display = 'block';
    loadAdminPosts();
  } else {
    document.getElementById('admin-err').textContent = 'パスワードが違います';
  }
}

function adminLogout() {
  isAdmin = false;
  document.getElementById('admin-login-area').style.display = 'block';
  document.getElementById('admin-panel').style.display = 'none';
  document.getElementById('admin-pw').value = '';
  goPost();
}

async function loadAdminPosts() {
  if (!configured()) { document.getElementById('admin-posts').innerHTML = `<div class="empty">Supabaseを設定してください</div>`; return; }
  const posts = await sbFetch('/rest/v1/posts?select=*&order=created_at.desc&limit=200');
  document.getElementById('admin-cnt').textContent = `${(posts || []).length}件`;
  const c = document.getElementById('admin-posts');
  if (!posts || posts.length === 0) { c.innerHTML = `<div class="empty">投稿がありません</div>`; return; }
  c.innerHTML = posts.map(p => {
    const th = p.image ? `<div class="pt-wrap" style="background-image:url('${p.image}')"></div>` : `<div class="pt-wrap"></div>`;
    return `<div class="prow" id="aprow-${p.id}">${th}<div style="flex:1;min-width:0"><div class="ptitle">${esc(p.title)}</div><div class="pcmt">${esc(p.comment || '—')}</div></div><button class="del-btn" style="display:block" onclick="deletePost('${p.id}', true)">削除</button></div>`;
  }).join('');
}

async function deletePost(id, fromAdmin = false) {
  if (!confirm('この投稿を削除しますか？')) return;
  await sbFetch(`/rest/v1/posts?id=eq.${id}`, { method: 'DELETE' });
  if (fromAdmin) { loadAdminPosts(); }
  else { loadPosts(); }
}

loadPosts();
</script>
